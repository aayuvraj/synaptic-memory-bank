version: '3.8'

services:
  memory_bank:
    build: .
    container_name: synaptic-memory-bank
    ports:
      - "8000:8000"
    volumes:
      - ./memory_storage:/app/memory_storage
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Optional: serve the frontend UI
  frontend:
    image: nginx:alpine
    container_name: synaptic-ui
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - memory_bank
    restart: unless-stopped
